steps:
  # 1. Run tests
  - name: python:3.11-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt --quiet
        python -m pytest demo/test_pipeline.py -v --timeout=60 || true

  # 2. Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/content-pipeline-agents:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/content-pipeline-agents:latest
      - .

  # 3. Push to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/content-pipeline-agents

  # 4. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - content-pipeline-agents
      - --image=gcr.io/$PROJECT_ID/content-pipeline-agents:$SHORT_SHA
      - --platform=managed
      - --region=us-central1
      - --memory=2Gi
      - --cpu=2
      - --timeout=3600
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,DEMO_MODE=false
      - --set-secrets=GOOGLE_API_KEY=google-api-key:latest

images:
  - gcr.io/$PROJECT_ID/content-pipeline-agents:$SHORT_SHA
  - gcr.io/$PROJECT_ID/content-pipeline-agents:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
